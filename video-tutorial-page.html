<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Tutorials | Shared Pearls of Wisdom</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --trust-blue: #1A365D;       
      --harvard-crimson: #A51C30;  
      --paper: #FFFFFF;
      --parchment: #F9F7F1;         
      --text-main: #2D3748;
      --text-muted: #718096;
      --border-light: #E2E8F0;
      --dark-overlay: rgba(15, 23, 42, 0.95);
    }

    body { 
      font-family: 'Inter', sans-serif; /* Clean, modern streaming font */
      background: var(--parchment); 
      color: var(--text-main); 
      margin: 0; padding: 0; 
    }

    /* ─── HEADER ─── */
    header { background: var(--trust-blue); padding: 3rem 2rem; text-align: center; color: var(--paper); border-bottom: 4px solid var(--harvard-crimson); }
    header h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; margin: 0; font-weight: 700;}
    .subtitle { font-family: 'DM Mono', monospace; font-size: 1rem; color: #90CDF4; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; }

    .container { max-width: 1200px; margin: 3rem auto; padding: 0 2rem; }

    /* ─── FILTER NAVIGATION ─── */
    .filter-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 3rem; }
    .filter-btn {
      background: transparent; border: 2px solid var(--border-light); color: var(--text-muted);
      padding: 0.6rem 1.5rem; border-radius: 30px; font-family: 'Inter', sans-serif; font-weight: 600;
      font-size: 0.95rem; cursor: pointer; transition: all 0.3s;
    }
    .filter-btn:hover { border-color: var(--trust-blue); color: var(--trust-blue); }
    .filter-btn.active { background: var(--trust-blue); border-color: var(--trust-blue); color: var(--paper); }

    /* ─── VIDEO GRID ─── */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2.5rem; }
    
    .video-card {
      background: var(--paper); border-radius: 12px; overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer; display: flex; flex-direction: column;
    }
    .video-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(26, 54, 93, 0.15); }
    
    /* Thumbnail Area */
    .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; /* 16:9 Aspect Ratio */ background: #000; overflow: hidden; }
    .thumbnail-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; transition: opacity 0.3s;}
    .video-card:hover .thumbnail-img { opacity: 0.6; }
    
    .play-icon {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      width: 60px; height: 60px; background: rgba(255,255,255,0.9); border-radius: 50%;
      display: flex; justify-content: center; align-items: center; opacity: 0; transition: all 0.3s;
    }
    .play-icon::after { content: ''; width: 0; height: 0; border-style: solid; border-width: 10px 0 10px 16px; border-color: transparent transparent transparent var(--harvard-crimson); margin-left: 4px;}
    .video-card:hover .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }

    .duration-tag {
      position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white;
      padding: 4px 8px; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 0.8rem;
    }

    /* Info Area */
    .card-info { padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; }
    .category-tag { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--harvard-crimson); text-transform: uppercase; margin-bottom: 8px; font-weight: bold;}
    .video-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; color: var(--trust-blue); margin: 0 0 10px 0; line-height: 1.2; }
    .video-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; margin: 0; flex-grow: 1; }

    /* ─── CINEMATIC MODAL ─── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-overlay);
      z-index: 1000; display: none; justify-content: center; align-items: center; padding: 2rem;
      backdrop-filter: blur(5px);
    }
    .modal-content {
      width: 100%; max-width: 900px; background: black; border-radius: 12px; overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative;
    }
    .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
    .video-wrapper video { 
      position: relative; padding-bottom: 56.25%; height: 0; 
      background-color: black; border-radius: 0 0 12px 12px;
    }
    
    .close-btn {
      position: absolute; top: -40px; right: 0; color: white; font-size: 2rem; cursor: pointer;
      background: none; border: none; font-family: 'Inter', sans-serif;
    }
    .close-btn:hover { color: var(--harvard-crimson); }
  </style>
</head>
<body>

  <header>
    <div class="subtitle">Video Library</div>
    <h1>Video Masterclass</h1>
  </header>

  <div class="container">
    
    <div class="filter-nav" id="filter-nav">
      <button class="filter-btn active" onclick="filterVideos('All')">All Tutorials</button>
      <button class="filter-btn" onclick="filterVideos('Tenses')">Timeline Mechanics</button>
      <button class="filter-btn" onclick="filterVideos('Vocabulary')">Lexical Resource</button>
      <button class="filter-btn" onclick="filterVideos('Academic')">Academic Mastery</button>
    </div>

    <div class="video-grid" id="video-grid">
      </div>

  </div>

  <div class="modal-overlay" id="video-modal" onclick="closeModal(event)">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal(event, true)">&times;</button>
      <div class="video-wrapper">
        <video id="local-player" controls controlsList="nodownload">
          Your browser does not support HTML5 video.
        </video>
      </div>
    </div>
  </div>

  <script>
      const videos = [
      {
        id: "1",
        title: "The Art of Expression: Mastering Figures of Speech",
        desc: "From the persuasive power of metaphors to the vivid imagery of personification, you will learn to wield words like a native speaker. Elevate your IELTS essays, captivate your listeners in speaking exams, and add undeniable flair to your everyday communication.",
        category: "Academic",
        duration: "7:17",
        thumbUrl: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
        videoFile: "Videos/video-tutorial-1.mp4"
      },
           {
        id: "2",
        title: "The Power of Nuance: Sophomoric vs. Fatuous",
        desc: "Elevate your vocabulary beyond basic synonyms. Learn the exact contexts required to score a Band 9 in Lexical Resource.",
        category: "Vocabulary",
        duration: "08:45",
        thumbUrl: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
        youtubeId: "dQw4w9WgXcQ"
      },
      {
        id: "3",
        title: "Inversion in Formal English",
        desc: "Learn to construct dramatic, highly formal academic sentences using negative adverbial inversion. 'Rarely do we see...'",
        category: "Academic",
        duration: "18:10",
        thumbUrl: "https://images.unsplash.com/photo-1513475382585-d06e73926c92?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
        youtubeId: "dQw4w9WgXcQ"
      },
      {
        id: "4",
        title: "Future Perfect: Projecting Accomplishments",
        desc: "A crucial tense for IELTS Speaking Part 3 and academic predictions. How to discuss the world of tomorrow with absolute precision.",
        category: "Tenses",
        duration: "11:30",
        thumbUrl: "https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
        youtubeId: "dQw4w9WgXcQ"
      },
      {
        id: "5",
        title: "Stop Saying 'Very': Transmuting Basic Words",
        desc: "A rapid-fire workshop on identifying weak adjectives in your writing and replacing them with high-impact vocabulary.",
        category: "Vocabulary",
        duration: "09:15",
        thumbUrl: "https://images.unsplash.com/photo-1455390582262-044cdead2708?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
        youtubeId: "dQw4w9WgXcQ"
      },
      {
        id: "6",
        title: "Mastering Mixed Conditionals",
        desc: "Break free from basic IF clauses. Learn how to mix past conditions with present results to express deep regret or hypothetical realities.",
        category: "Academic",
        duration: "22:00",
        thumbUrl: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
        youtubeId: "dQw4w9WgXcQ"
      },
            {
        id: "8",
        title: "Demystifying the Present Perfect Continuous",
        desc: "Master the subtle difference between actions that have finished and actions that are still bleeding into the present moment.",
        category: "Tenses",
        duration: "14:20",
        thumbUrl: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80",
        youtubeId: "dQw4w9WgXcQ" 
      },
    ];

    function renderVideos(categoryToFilter = 'All') {
      const grid = document.getElementById('video-grid');
      grid.innerHTML = ''; 

      videos.forEach(video => {
        if (categoryToFilter === 'All' || video.category === categoryToFilter) {
          const card = document.createElement('div');
          card.className = 'video-card';
          
          // THIS IS THE CRUCIAL LINE:
          card.onclick = () => openModal(video.videoFile);

          card.innerHTML = `
            <div class="thumbnail-container">
              <img src="${video.thumbUrl}" alt="${video.title}" class="thumbnail-img">
              <div class="play-icon"></div>
              <div class="duration-tag">${video.duration}</div>
            </div>
            <div class="card-info">
              <div class="category-tag">${video.category}</div>
              <h3 class="video-title">${video.title}</h3>
              <p class="video-desc">${video.desc}</p>
            </div>
          `;
          grid.appendChild(card);
        }
      });
    }

    // 3. FILTER NAVIGATION
    function filterVideos(category) {
      const buttons = document.querySelectorAll('.filter-btn');
      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderVideos(category);
    }

    // 4. LOCAL VIDEO MODAL LOGIC
    function openModal(videoFilePath) {
      const modal = document.getElementById('video-modal');
      const player = document.getElementById('local-player');
      
      player.src = videoFilePath;
      modal.style.display = 'flex';
      player.play(); // Auto-plays the video
    }

    function closeModal(event, forceClose = false) {
      if (forceClose || event.target.id === 'video-modal') {
        const modal = document.getElementById('video-modal');
        const player = document.getElementById('local-player');
        
        modal.style.display = 'none';
        player.pause(); // Stops the audio
        player.src = ''; // Resets the player
      }
    }

    // START THE PAGE
    renderVideos();
  </script>
</body>
</html>
