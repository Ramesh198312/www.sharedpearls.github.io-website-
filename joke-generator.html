<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Random Joke Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            text-align: center;\n            padding: 50px;\n        }\n        #joke {\n            margin: 20px;\n            font-size: 24px;\n        }\n        button {\n            padding: 10px 20px;\n            font-size: 18px;\n        }\n    </style>\n</head>\n<body>\n    <h1>Random Joke Generator</h1>\n    <div id="joke">Click the button to get a joke!</div>\n    <button id="jokeButton">Get Joke</button>\n    <script>\n        document.getElementById('jokeButton').addEventListener('click', function() {\n            fetch('https://official-joke-api.appspot.com/random_joke')\n                .then(response => response.json())\n                .then(data => {\n                    document.getElementById('joke').innerText = data.setup + ' - ' + data.punchline;\n                })\n                .catch(error => {\n                    document.getElementById('joke').innerText = 'Oops! Something went wrong.';\n                });\n        });\n    <\/script>\n</body>\n</html>
